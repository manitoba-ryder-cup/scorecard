version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/postgres/queries"
    schema: "internal/db/postgres/migrations"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/postgres/internal/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          # Map Postgres uuid straight to google/uuid.UUID (and *uuid.UUID when
          # nullable), so repos hand the domain's uuid types through without any
          # pgtype.UUID conversion.
          - db_type: "uuid"
            nullable: false
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              pointer: true
              type: "UUID"
          # Map date/timestamp/timestamptz to time.Time (and *time.Time when
          # nullable), so repos work in stdlib time and never touch pgtype.
          - db_type: "date"
            nullable: false
            go_type:
              type: "time.Time"
          - db_type: "date"
            nullable: true
            go_type:
              pointer: true
              type: "time.Time"
          - db_type: "timestamptz"
            nullable: false
            go_type:
              type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              pointer: true
              type: "time.Time"
